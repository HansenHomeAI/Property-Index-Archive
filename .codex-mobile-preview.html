<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Canyon Vista Mobile Preview</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #1f2426;
      color: #eef3f0;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .shell {
      width: min(390px, 100vw);
      height: min(844px, calc(100vh - 32px));
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      background: #000;
      box-shadow: 0 18px 56px rgba(0, 0, 0, 0.42);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="390 by 844 mobile preview">
    <iframe src="/Canyon-Vista/index.html?mobile-preview=13" title="Canyon Vista mobile viewport"></iframe>
  </main>
</body>
</html>
